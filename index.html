<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <title>Stormy</title>
</head>
<body>
  <header class="flex flex-col">
    <section class="flex justify-between items-center lg:px-20">
      <a href="index.html" class="hover:opacity-50 h-auto w-50 ">

        <img src="images/logo.png" alt="Stormy logo" class="h-auto   hover:opacity-80 "  />
      
      </a>
        
      
      <h1 id="stormy-text" class="font-bold text-center text-4xl w-2/4 md:text-5xl lg:text-7xl mr-2 ">
        <a href="index.html" class="hover:opacity-80">
          Stormy
        </a>
      </h1>
      <div class="topnav">
        <button id="menuOpen" class="p-2 cursor-pointer">
          <img src="images/icons/hambuger-menu.svg" id="hambiMenu" class="w-20 h-20 justify-center items-center mt-8" alt="Menü" />
        </button>
        <div id="myLinks" class="menu font-bold">
          <button id="menuClose" class="close-btn">✕</button>
          <a href="index.html">Főoldal</a>
          <a href="registeration.html" id="registerLink">Regisztráció</a>
          <a href="login.html" id="loginLink">Bejelentkezés</a>
          <a href="#" id="logoutLink" style="display: none;">Kijelentkezés</a>
          <a href="#" id="open-music-menu" style="display: none;">Zenelejátszó</a>
        </div>
      </div>

      <a href="javascript:void(0);" class="icon"><i class="fa fa-bars"></i></a>

      <style>
        .topnav { position: relative; }
        .menu {
          position: fixed; top: 0; right: -100%; width: 70%; max-width: 300px; height: 100vh;
          background: #476D98; display: flex; flex-direction: column; padding: 2rem 1rem;
          transition: right 0.3s ease; z-index: 1000;
        }
        .menu.active { right: 0; }
        .menu a { color: white; text-decoration: none; padding: 1rem; font-size: 1.2rem; }
        .menu a:hover { background: rgba(255,255,255,0.2); border-radius: 8px; }
        .close-btn { align-self: flex-end; font-size: 2rem; color: white; background: none; border: none; cursor: pointer; margin-bottom: 1rem; }
      </style>
      <script>
       
      </script>
    </section>

        <section class="flex justify-between mx-2 py-5 items-center">
            <div>
                <input type="text" id="varosinput" placeholder="Keresés..." class="h-10 w-auto bg-[#476D98] rounded-lg px-2">
                <div id="talalatok" class="absolute mt-1 bg-[#82B3DB] rounded-md min-w-50"></div>
            </div>

            <div class="flex flex-row justify-evenly bg-[#82B3DB] rounded-full h-auto  py-1 gap-1 px-1 w-l">
                <div class="toggle-celsius bg-[#476D98] w-10 h-10 rounded-full flex justify-center items-center cursor-pointer" onclick="changeUnit('celsius')">
                    <p>°C</p>
                </div>
                <div class="toggle-fahrenheit w-10 h-10 rounded-full flex justify-center items-center cursor-pointer" onclick="changeUnit('fahrenheit')">
                    <p>°F</p>
                </div>
                
            </div>
        </section>
    </header>

    <main class="grid grid-cols-1 auto-rows-min lg:grid-cols-3">
        <section class="lg:col-start-1 lg:row-start-1">
            <div id="jelenlegi_idojaras" class="flex justify-between bg-[#476D98] p-4 rounded-lg m-2 h-auto h-[-webkit-fill-available]!">
                <!-- Jelenlegi időjárás -->
            </div>
        </section>

        <section class="lg:row-start-1 lg:col-start-2 lg:col-span-2">
            <div id="orankenti_idojaras" class="flex m-2 h-[-webkit-fill-available]!">
                <!-- Óránkénti időjárás -->
            </div>
        </section>

        <section class="lg:row-start-2 lg:col-start-2 lg:col-span-2">
            <div id="napi_idojaras" class="flex flex-col m-2 col-span-2 h-[-webkit-fill-available]!">
                <!-- Napi időjárás -->
            </div>
        </section>

        <section class="lg:row-start-2 lg:col-start-1 lg:row-span-2">
            <div id="idojaras_jellemzoi" class="flex flex-col justify-evenly m-2 p-2 rounded-lg bg-[#82B3DB] h-[-webkit-fill-available]!">
                <!-- Időjárás jellemzői -->
            </div>
        </section>

        <section class="lg:row-start-3 lg:col-start-2 lg:col-span-2">
            <div id="vitamin_ajanlo" class="w-auto bg-[#82B3DB] h-auto rounded-lg m-2 p-2 sm:p-4 flex flex-col justify-evenly h-[-webkit-fill-available]!">
               <!-- Vitamin ajánló -->
            </div>
        </section>
    </main>

  <div id="zene-ikon">
    <button id="music-toggle" class="fixed bottom-4 right-4 bg-[#8CD9FF] p-3 rounded-full shadow-lg hover:bg-[#2F8BB7]">
      <img src="images/icons/zene icon.svg" class="w-8 h-8 cursor-pointer" />
    </button>
  </div>

  <!-- Music Panel -->
  <div id="music-panel" class="hidden fixed max-md:right-4 max-md:bottom-105 bottom-24 right-4 bg-[#769fd1] rounded-2xl p-6 w-80 z-50 ">
    <div class="flex justify-between items-center mb-4">
      <div class="flex items-center">
        <div class="flex items-center">
          <img id="song-cover" src="images/icons/profil.svg" class="w-12 h-12 rounded-md object-cover " />
        
          <div class="ml-4">
            <p id="song-title" class="text-lg font-bold">Zene címe</p>
            <p id="song-artist" class="text-sm">Előadó neve</p>
          </div>
        </div>
      </div>
      <button id="close-music" class="w-5 h-5 cursor-pointer"><img src="images/icons/close icon.svg" /></button>
    </div>

    <div class="mt-3">
      <label for="mood-filter" class="block text-sm mb-1">Hangulat / Időjárás</label>
      <select id="mood-filter" class="w-full p-2 rounded bg-[#5A7BAA] text-white">
        <option value="" selected>Válassz hangulatot…</option>
        <option value="clear">Napos</option>
        <option value="clouds">Borús</option>
        <option value="rain">Esős</option>
        <option value="thunder">Viharos</option>
        <option value="snow">Havas</option>
        <option value="mist">Ködös</option>
        <option value="wind">Szeles</option>
      </select>
    </div>

    <div class="mt-2 px-1 ">
      <input id="progress-bar" type="range" min="0" max="100" value="0" class="w-full h-1 bg-[#5A7BAA] rounded-lg appearance-none cursor-pointer accent-[#8CD9FF]">
      <div class="flex justify-between text-xs text-white mt-1">
        <span id="current-time">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>

    <div class="flex justify-between items-center text-xl mt-3 ">
      <button  id="prev" class="cursor-pointer"><img src="images/icons/prev.svg" class="w-7 h-7" alt="Previous"></button>
      <button id="play-pause" class="cursor-pointer"><img src="images/icons/play.svg" class="w-7 h-7" alt="Play/Pause"></button>
      <button id="next" class="cursor-pointer"><img src="images/icons/next.svg" class="w-6 h-6" alt="Next"></button>
      <button id="recommend-music" class="cursor-pointer" title="Zeneajánló (időjárás alapján)">🎵</button>
      <button id="open-add-music" class="cursor-pointer" title="Zene hozzáadása">➕</button>
      <button id="toggle-favorite" class="cursor-pointer" title="Kedvencek közé / onnan ki">🤍</button>
      <button id="delete-track" class="cursor-pointer" title="Jelenlegi zene törlése">🗑</button>
    </div>
    <div class="flex justify-between items-center text-sm mt-2">
      <button id="toggle-favorites-only" class="px-2 py-1 rounded bg-[#5A7BAA] text-white cursor-pointer" title="Csak kedvencek megjelenítése">Csak kedvencek: KI</button>
    </div>
  </div>

  <!-- Add Music Modal -->
  <div id="add-music-modal" class="hidden fixed max-md:bottom-24 max-md:right-4 bottom-24 right-96 bg-[#769fd1] rounded-2xl p-6 w-80 z-50">
    <h2 class="text-lg font-bold mb-4 text-center">Egyéni zene hozzáadása</h2>
    <input id="music-url" type="text" placeholder="Zene URL (YouTube, SoundCloud vagy MP3)" class="w-full mb-3 p-2 rounded bg-[#5A7BAA] text-white" />
    <input id="music-title" type="text" placeholder="Zene címe" class="w-full mb-2 p-2 rounded bg-[#5A7BAA] text-white" />
    <label for="music-mood" class="block text-sm mb-1 cursor-pointer">Hangulat / Időjárás</label>
    <select id="music-mood" class="w-full mb-4 p-2 rounded bg-[#5A7BAA] text-white">
      <option value="" >(opcionális)</option>
      <option value="clear">Napos</option>
      <option value="clouds">Borús</option>
      <option value="rain">Esős</option>
      <option value="thunder">Viharos</option>
      <option value="snow">Havas</option>
      <option value="mist">Ködös</option>
      <option value="wind">Szeles</option>
     
    </select>
    <div class="flex justify-between">
      <button id="cancel-music" class="bg-[#476D98] px-4 py-2 rounded">Mégse</button>
      <button id="add-music" class="bg-[#476D98] px-4 py-2 rounded">Hozzáadás</button>
    </div>
  </div>

  <!-- Players -->
  <audio id="audio-player"></audio>
  <div style="position:fixed; bottom:0; left:0; width:320px; height:180px; opacity:0.1; pointer-events:none;" class="hidden"><div id="yt-player"></div></div>
  <div style="position:fixed; bottom:0; left:330px; width:320px; height:180px; opacity:0.1; pointer-events:none; "class="hidden"><iframe id="sc-player" allow="autoplay"></iframe></div>

  <script src="https://w.soundcloud.com/player/api.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>

  
  
  <script src="index.js"></script>
  <script src="menu.js"></script>
  <script src="zeneajanlo.js"></script>
  <script src="villam.js"></script>

  <canvas id="lightning-canvas"></canvas>

<audio id="thunder-sound" src="https://www.soundjay.com/nature/thunder-1.mp3"></audio>
</body>
</html>
