<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login</title>
</head>
<body class="bg-[#C7E1EE] text-white font-bold text-3xl">
    <header class="flex items-center justify-center py-4">
      <a href="index.html" class="hover:opacity-50 h-auto  max-w-50">

        <img src="images/logo.png" alt="Stormy logo" class="h-auto  max-w-50 hover:opacity-80 "  />
      
      </a>
        
      <h1 class="font-bold text-center text-4xl w-2/4 md:text-5xl lg:text-7xl"><a href="index.html" class="hover:opacity-80">
        Stormy
      </a>
    </h1>
      <div class="topnav">
        
        <button id="menuOpen" class="p-2">
          <img src="images/icons/hambuger-menu.svg" class="w-20 h-20 ml-35" alt="Menü">
        </button>
      
       
        <div id="myLinks" class="menu">
          
          <button id="menuClose" class="close-btn">✕</button>
      
          <a href="index.html">Főoldal</a>
          <a href="registeration.html" id="registerLink">Regisztráció</a>
          <a href="login.html" id="loginLink">Bejelentkezés</a>
          <a href="#" id="logoutLink" style="display: none;">Kijelentkezés</a>
        </div>
      </div>
            
            <a href="javascript:void(0);" class="icon" onclick="myFunction()">
              <i class="fa fa-bars"></i>
            </a>
          </div>
          <style>
          .topnav {
            position: relative;
          }
          
         
          .menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 70%;
            max-width: 300px;
            height: 100vh;
            background: #476D98;
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            transition: right 0.3s ease;
            z-index: 1000;
          }
          
         
          .menu.active {
            right: 0;
          }
          
          .menu a {
            color: white;
            text-decoration: none;
            padding: 1rem;
            font-size: 1.2rem;
          }
          
          .menu a:hover {
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
          }
          
         
          .close-btn {
            align-self: flex-end;
            font-size: 2rem;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
            margin-bottom: 1rem;
          }
          
  </style>
 
    </header>

    <main class="flex flex-col items-center justify-center min-h-screen min-w-full">
        <form id="loginForm" action="#" method="POST" class="bg-[#82B3DB] p-8 rounded-2xl flex flex-col space-y-6 w-xl ">
            <h2 class="mb-8 text-4xl text-center">Bejelentkezés</h2>
            
           
            <div class="flex items-center bg-[#5A7BAA] p-3 rounded-md">
                <img src="images/icons/email icon.svg" alt="Email Icon" class="w-5 mr-3">
                <input id="loginEmail" type="email" name="email" placeholder="Email cím" class="bg-transparent text-white flex-1 outline-none text-base" required>
            </div>
            
           
            <div class="flex items-center bg-[#5A7BAA] p-3 rounded-md ">
                <img src="images/icons/lakat icon.svg" alt="Lock Icon" class="w-5 mr-3">
                <input id="loginPassword" type="password" name="password" placeholder="Jelszó" class="bg-transparent text-white flex-1 outline-none text-base " required>
                <img id="togglePassword" src="images/icons/szem icon.svg" alt="Eye Icon" class="w-5 h-5 ml-3 cursor-pointer">
            </div>
            
            
            <div class="flex items-center">
                <input type="checkbox" name="remember_me" id="remember_me" class="mr-2">
                <label for="remember_me" class="text-white text-sm">Emlékezz rám</label>
                <a href="#" class="text-white text-xs ml-5 underline">Elfelejtetted a jelszavad?</a>
            </div>
            
           
            <button type="submit" class="bg-[#5A7BAA] text-white font-bold py-3 rounded-md hover:bg-[#6fa0c8] transition duration-300">
                Bejelentkezés
            </button>
            
           
            <p class="text-center text-white text-sm mt-4">
                Nincs fiókod? <a href="registeration.html" class="underline">Regisztrálj be!</a>
            </p>
        </form>
    </main>

    <script>
       
        const togglePassword = document.getElementById('togglePassword');
        const passwordField = document.getElementById('loginPassword');

        togglePassword.addEventListener('click', () => {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);

            
            if (type === 'text') {
                togglePassword.src = 'images/icons/szem csukott.svg'; 
            } else {
                togglePassword.src = 'images/icons/szem icon.svg'; 
            }
        });


    // Login logika
    const form = document.forms['loginForm'];
const message = document.getElementById('message');

// Betöltjük a regisztrált usereket
const users = JSON.parse(localStorage.getItem('users')) || [];

form.addEventListener('submit', (e) => {
    e.preventDefault();

    const email = form.elements['email'].value.trim();
    const password = form.elements['password'].value;

    // Megkeressük a felhasználót
    const user = users.find(
        u => u.email === email && u.password === password
    );

    if (user) {
          // Üzenet kiírása
          alert('Sikeresen bejelentkeztél! 🎉');
        
        // Belépett user eltárolása
        localStorage.setItem('loggedUser', JSON.stringify(user));
        
        // Átirányítás a főoldalra
        window.location.href = "index.html";
    } else {
        message.textContent = 'Hibás email vagy jelszó!';
        message.className = 'text-red-500 text-center text-sm';
    }
});

</script>
<script src="menu.js"></script>
   
</body>
</html>
