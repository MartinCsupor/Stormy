<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css">
    <title>Login</title>
</head>
<body class="bg-[#C7E1EE] text-white font-bold text-3xl">
    <header class="flex flex-col">
        <section class="flex justify-between items-center lg:px-20">
            <div class="w-1/3 flex-1">
                <a href="index.html" class="hover:opacity-50 h-auto">
                    <img src="images/logo.png" alt="Stormy logo" class="h-auto w-25 sm:w-50 md:max-w-[200px] max-w-[150px] hover:opacity-80 ">
                </a>
            </div>
            
            <div class="w-1/3 flex-1">
                <h1 class="font-bold text-center text-4xl md:text-5xl lg:text-7xl">
                    <a href="index.html" class="hover:opacity-80">
                    Stormy
                    </a>
                </h1>
            </div>

            <div class="topnav flex justify-end w-1/3">
                <button id="menuOpen" class="p-2 cursor-pointer">
                <img src="images/icons/hambuger-menu.svg" id="hambiMenu" class="w-20 h-20 justify-center items-center flex-1" alt="Menü">
                </button>
                <div id="myLinks" class="menu font-bold">
                <button id="menuClose" class="close-btn">✕</button>
                <a href="index.html">Főoldal</a>
                <a href="registeration.html" id="registerLink">Regisztráció</a>
                <a href="login.html" id="loginLink">Bejelentkezés</a>
                <a href="#" id="logoutLink" style="display: none;">Kijelentkezés</a>
                </div>
            </div>

            <a href="javascript:void(0);" class="icon"><i class="fa fa-bars"></i></a>

            <style>
                .topnav { position: relative; }
                .menu {
                position: fixed; top: 0; right: -100%; width: 70%; max-width: 300px; height: 100vh;
                background: #476D98; display: flex; flex-direction: column; padding: 2rem 1rem;
                transition: right 0.3s ease; z-index: 1000;
                }
                .menu.active { right: 0; }
                .menu a { color: white; text-decoration: none; padding: 1rem; font-size: 1.2rem; }
                .menu a:hover { background: rgba(255,255,255,0.2); border-radius: 8px; }
                .close-btn { align-self: flex-end; font-size: 2rem; color: white; background: none; border: none; cursor: pointer; margin-bottom: 1rem; }
            </style>
            <script>
            
            </script>
        </section>
    </header>

    <main class="flex flex-col items-center justify-center pt-20">
        <form id="loginForm" action="#" method="POST" class="bg-[#82B3DB] w-[clamp(21rem,60vw,32rem)] p-8 rounded-2xl flex flex-col space-y-6 ">
            <h2 class="mb-8 text-4xl text-center">Bejelentkezés</h2>
            
           
            <div class="flex items-center bg-[#5A7BAA] p-3 rounded-md">
                <img src="images/icons/email icon.svg" alt="Email Icon" class="w-5 mr-3">
                <input id="loginEmail" type="email" name="email" placeholder="Email cím" class="bg-transparent text-white flex-1 outline-none text-base" required>
            </div>
            
           
            <div class="flex items-center bg-[#5A7BAA] p-3 rounded-md ">
                <img src="images/icons/lakat icon.svg" alt="Lock Icon" class="w-5 mr-3">
                <input id="loginPassword" type="password" name="password" placeholder="Jelszó" class="bg-transparent text-white flex-1 outline-none text-base w-[90%]" required>
                <img id="togglePassword" src="images/icons/szem icon.svg" alt="Eye Icon" class="w-5 h-5 ml-3 cursor-pointer">
            </div>
            
            
            <div class="flex items-center">
                <input type="checkbox" name="remember_me" id="remember_me" class="mr-2">
                <label for="remember_me" class="text-white text-sm">Emlékezz rám</label>
                <a href="forgotPass.html" class="ml-50 underline text-white text-sm hover:underline">Elfeltete a jelszavát?</a>
            
                
            </div>
            
           
            <button type="submit" class="bg-[#5A7BAA] text-white font-bold py-3 rounded-md hover:bg-[#6fa0c8] transition duration-300">
                Bejelentkezés
            </button>
            
           
            <p class="text-center text-white text-sm mt-4">
                Nincs fiókod? <a href="registeration.html" class="underline">Regisztrálj be!</a>
            </p>
        </form>
    </main>

    <script>
        // ===== MODERN NOTIFICATION FUNCTION (Toast) =====
       
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.textContent = message;

    
            notification.className = 'fixed top-20 right-5 p-4 rounded-lg text-white font-bold shadow-xl transform transition-all duration-500 ease-in-out z-[2000] opacity-0 translate-x-full';

            if (type === 'error') {
                notification.classList.add('bg-red-600');
            } else if (type === 'info') {
                notification.classList.add('bg-blue-500');
            } else { // 'success'
                notification.classList.add('bg-green-500');
            }

            document.body.appendChild(notification);
            requestAnimationFrame(() => { notification.classList.remove('opacity-0', 'translate-x-full'); });

            setTimeout(() => {
                notification.classList.add('opacity-0', 'translate-x-full');
                notification.addEventListener('transitionend', () => notification.remove());
            }, 2000);
        }
       
        const togglePassword = document.getElementById('togglePassword');
        const passwordField = document.getElementById('loginPassword');

        togglePassword.addEventListener('click', () => {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);

            
            if (type === 'text') {
                togglePassword.src = 'images/icons/szem csukott.svg'; 
            } else {
                togglePassword.src = 'images/icons/szem icon.svg'; 
            }
        });


    // Login logika
    const form = document.forms['loginForm'];
    // A 'message' elem nincs definiálva a HTML-ben, ezért a toast notifikációt használjuk.

// Betöltjük a regisztrált usereket
const users = JSON.parse(localStorage.getItem('users')) || [];

form.addEventListener('submit', (e) => {
    e.preventDefault();

    const email = form.elements['email'].value.trim();
    const password = form.elements['password'].value;

    // Megkeressük a felhasználót
    const user = users.find(
        u => u.email === email && u.password === password
    );

    if (user) {
        // Belépett user eltárolása
        localStorage.setItem('loggedUser', JSON.stringify(user));
        
        showNotification('Sikeres bejelentkezés! 🎉', 'success');
        // Rövid késleltetés, hogy a felhasználó lássa az üzenetet átirányítás előtt
        setTimeout(() => { window.location.href = "index.html"; }, 1000);
    } else {
        showNotification('Hibás email vagy jelszó!', 'error');
    }
});

</script>
<script src="menu.js"></script>
   
</body>
</html>
